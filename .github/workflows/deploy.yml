name: Deploy to Vercel via Target Repo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Pushes to another repository
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          DESTINATION_REPOSITORY: 'jisupark123/doda-web'
          TARGET_BRANCH: 'main'
        run: |
          # 대상 리포지토리 URL 설정 (Fine-grained 토큰 호환)
          TARGET_URL="https://${TARGET_REPO_TOKEN}@github.com/${DESTINATION_REPOSITORY}.git"
          
          # 기존 커밋 히스토리와 작성자, 메시지를 그대로 유지하며 동기화
          git remote add target "$TARGET_URL"
          git push -f target HEAD:${TARGET_BRANCH}
